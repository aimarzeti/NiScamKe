server.port=8080

# Application identity
spring.application.name=NiScamKe-Backend
spring.config.import=optional:file:./secrets/application-secrets.properties

# Local in-memory database for the protection service
spring.datasource.url=jdbc:h2:mem:niscamkedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Keep runtime logs clean. Flip to true only when inspecting database queries.
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Gemini API key. Prefer environment variable in deployments; local demo key is loaded from ./secrets/application-secrets.properties.
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=gemini-2.0-flash
