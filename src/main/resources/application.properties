server.port=8080

# Give your application a cool hackathon name
spring.application.name=NiScamKe-Backend
spring.config.import=optional:file:./secrets/application-secrets.properties

# For local testing without crashing, tell Spring Boot to use a built-in memory bank
spring.datasource.url=jdbc:h2:mem:niscamkedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Keep demo logs clean. Flip to true only when debugging database queries.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Gemini API key. Prefer environment variable in deployments; local demo key is loaded from ./secrets/application-secrets.properties.
gemini.api.key=${GEMINI_API_KEY:}
