server.port=8080

spring.application.name=NiScamKe-Backend
spring.config.import=optional:file:./secrets/application-secrets.properties

# Local demo database. Flyway still validates the schema so judges can see real migrations.
spring.datasource.url=jdbc:h2:mem:niscamkedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Keep demo logs clean. Flip to true only when debugging database queries.
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Gemini API key. Set this locally with: $env:GEMINI_API_KEY="your-key"
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=gemini-2.0-flash

# Demo partner API key for banks, e-wallets, universities, or telcos.
# Override locally with: $env:NISCAMKE_PARTNER_API_KEY="your-partner-key"
niscamke.partner.api-key=${NISCAMKE_PARTNER_API_KEY:demo-partner-key}
