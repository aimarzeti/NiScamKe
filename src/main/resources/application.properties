server.port=8081

# Give your application a cool hackathon name
spring.application.name=NiScamKe-Backend

# For local testing without crashing, tell Spring Boot to use a built-in memory bank
spring.datasource.url=jdbc:h2:mem:niscamkedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Show SQL queries in the terminal so we can see what's happening
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Gemini API key 
gemini.api.key=NiScamKeKey 