<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NiScamKe Trust Review</title>
  <style>
    :root {
      --bg: #fff8ef;
      --ink: #10243e;
      --muted: #657489;
      --safe: #11845b;
      --block: #c1281f;
      --blue: #1155cc;
      --line: rgba(16, 36, 62, 0.12);
      --shadow: 0 22px 60px rgba(16, 36, 62, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Aptos", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, rgba(17, 85, 204, 0.14), transparent 30%),
        radial-gradient(circle at 90% 20%, rgba(255, 193, 87, 0.34), transparent 34%),
        var(--bg);
    }

    .wrap {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 34px 18px 48px;
    }

    .hero {
      padding: 26px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--blue);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 60px);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .muted {
      max-width: 720px;
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .btn,
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      text-decoration: none;
    }

    .btn {
      color: #ffffff;
      background: var(--blue);
    }

    .list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .row {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 12px 32px rgba(16, 36, 62, 0.08);
    }

    .row-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .domain {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .url,
    .meta {
      margin: 6px 0 0;
      color: var(--muted);
      overflow-wrap: anywhere;
      line-height: 1.45;
    }

    .pill {
      white-space: nowrap;
      padding: 6px 10px;
      border-radius: 999px;
      color: #7a4b00;
      background: #fff2d8;
      font-size: 12px;
      font-weight: 900;
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #e8edf5;
    }

    .approve {
      background: var(--safe);
      color: #ffffff;
    }

    .reject {
      background: var(--block);
      color: #ffffff;
    }

    .empty {
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--muted);
      text-align: center;
    }

    .status {
      min-height: 22px;
      margin-top: 14px;
      color: var(--blue);
      font-weight: 900;
    }

    @media (max-width: 680px) {
      .row-head {
        display: block;
      }

      .pill {
        display: inline-flex;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <p class="eyebrow">Human-in-the-loop safety</p>
      <h1>Trust Review Queue</h1>
      <p class="muted">
        Approve a report when the blocked site is legitimate. Reject it when protection should stay active.
        Reviewer decisions keep the protection layer accountable and reduce unnecessary friction.
      </p>
      <div class="actions">
        <a class="btn" href="/dashboard.html">Back to Dashboard</a>
        <a class="btn" href="/api/v1/false-positive?status=PENDING_REVIEW">Pending Queue</a>
      </div>
      <div class="status" id="statusLine"></div>
    </section>

    <section class="list" id="list" aria-live="polite"></section>
  </main>

  <script>
    async function api(path, opts) {
      const res = await fetch(path, opts);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    function setStatus(message) {
      document.getElementById('statusLine').textContent = message;
    }

    async function review(id, status) {
      setStatus(`Saving ${status.toLowerCase()} decision...`);
      await api('/api/v1/false-positive/' + id + '/status', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          status,
          reviewNote: status === 'APPROVED' ? 'Reviewed as legitimate by moderator.' : 'Reviewed and still suspicious.'
        })
      });
      setStatus(`Report ${status.toLowerCase()} successfully.`);
      await load();
    }

    function createText(tag, className, text) {
      const el = document.createElement(tag);
      el.className = className;
      el.textContent = text;
      return el;
    }

    function renderItem(item) {
      const row = document.createElement('article');
      row.className = 'row';

      const head = document.createElement('div');
      head.className = 'row-head';

      const titleWrap = document.createElement('div');
      titleWrap.appendChild(createText('p', 'domain', item.domainName || 'Unknown domain'));
      titleWrap.appendChild(createText('p', 'url', item.url || '-'));

      const pill = createText('span', 'pill', item.status || 'PENDING_REVIEW');
      head.append(titleWrap, pill);

      row.appendChild(head);
      row.appendChild(createText('p', 'meta', `Reason: ${item.reason || '-'} | Reporter: ${item.reporterEmail || 'anonymous'} | Decision ID: ${item.decisionId || '-'}`));

      const actions = document.createElement('div');
      actions.className = 'row-actions';

      const approve = document.createElement('button');
      approve.className = 'approve';
      approve.type = 'button';
      approve.textContent = 'Approve safe site';
      approve.onclick = () => review(item.id, 'APPROVED').catch(error => setStatus(error.message));

      const reject = document.createElement('button');
      reject.className = 'reject';
      reject.type = 'button';
      reject.textContent = 'Reject report';
      reject.onclick = () => review(item.id, 'REJECTED').catch(error => setStatus(error.message));

      actions.append(approve, reject);
      row.appendChild(actions);
      return row;
    }

    async function load() {
      const list = document.getElementById('list');
      list.innerHTML = '';

      try {
        const data = await api('/api/v1/false-positive?status=PENDING_REVIEW');
        if (!data.length) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'No pending review requests. The trust queue is clear.';
          list.appendChild(empty);
          return;
        }

        data.forEach(item => list.appendChild(renderItem(item)));
      } catch (error) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'Could not load review queue. Check that the protection service is running and refresh.';
        list.appendChild(empty);
      }
    }

    load();
  </script>
</body>
</html>
